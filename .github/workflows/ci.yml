name: CI
on:
  pull_request:
  push:
    branches:
      - master
jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 50
    strategy:
      fail-fast: false
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-java@v5
      with:
        java-version: 17
        distribution: temurin
    - uses: coursier/cache-action@v8
    - uses: sbt/setup-sbt@v1
    - run: sbt
           -v
           --server
           scalafmtSbtCheck
           "+ scalafmtCheckAll"
           "+ exampleJVM/test"
           "+ exampleJS/test"
           "+ exampleNative/test"
           "+ exampleNative/nativeLink"
    - run: ./native/target/scala-2.13/scalaprops-cross-example
    - run: ./native/target/scala-2.13/scalaprops-cross-example-test
    - run: ./native/target/scala-3.8.4/scalaprops-cross-example
    - run: ./native/target/scala-3.8.4/scalaprops-cross-example-test
